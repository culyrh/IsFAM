<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>IsFAM Call Demo</title>
  </head>
  <body>
    <div id="app">
      <main class="phone-frame">
        <section class="call-screen">
          <header class="call-header">
            <div class="voice-badge">
              <span>HD</span>
              <strong>Voice</strong>
              <b id="callTimer">00:00</b>
            </div>
            <button id="toggleSetupBtn" class="more-button" type="button" aria-label="시연 설정 열기">
              ⋮
            </button>
          </header>

          <section class="caller-area">
            <h1 id="callerNumber">010-0000-0000</h1>
            <p id="callState">통화 준비</p>
          </section>

          <section id="aiCard" class="ai-card judgment">
            <img id="statusImage" class="status-image" src="/assets/judgment.png" alt="" />
            <div class="status-copy">
              <strong id="warningTitle">AI가 판단 중입니다</strong>
              <p id="warningMessage">통화 음성 파일을 선택하고 통화를 시작하세요.</p>
            </div>
            <div class="waveform" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
          </section>

          <section class="control-panel" aria-label="통화 기능">
            <div class="control-grid">
              <button type="button" class="call-option">
                <span class="option-icon">◎</span>
                <span>녹음</span>
              </button>
              <button type="button" class="call-option">
                <span class="option-icon">▰</span>
                <span>영상녹화</span>
              </button>
              <button type="button" class="call-option">
                <span class="option-icon">⌁</span>
                <span>블루투스</span>
              </button>
              <button type="button" class="call-option">
                <span class="option-icon">◖</span>
                <span>스피커</span>
              </button>
              <button type="button" class="call-option">
                <span class="option-icon">⌁</span>
                <span>내 소리 차단</span>
              </button>
              <button type="button" class="call-option">
                <span class="option-icon dots">•••</span>
                <span>키패드</span>
              </button>
            </div>

            <button id="stopCallBtn" class="hangup-button" type="button" aria-label="통화 종료">
              <span></span>
            </button>
          </section>

          <div class="system-nav" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <audio id="callAudioPlayer"></audio>
        </section>
      </main>

      <aside id="setupSheet" class="setup-sheet">
        <div class="sheet-card">
          <div class="sheet-title">
            <div>
              <p id="networkStatus">서버 상태 확인 중</p>
              <strong>시연 설정</strong>
            </div>
            <button id="closeSetupBtn" type="button" class="text-button">닫기</button>
          </div>

          <label class="field">
            <span>API 서버 주소</span>
            <input id="apiBaseInput" type="url" inputmode="url" />
          </label>

          <label class="field">
            <span>화면에 표시할 전화번호</span>
            <input id="callerNumberInput" type="text" value="010-0000-0000" />
          </label>

          <label class="field">
            <span>저장된 가족 이름</span>
            <input id="familyNameInput" type="text" value="엄마" />
          </label>

          <label class="file-card">
            <span>통화 음성 파일</span>
            <input id="callAudioFile" type="file" accept="audio/*" />
            <strong id="callFileName">파일 선택</strong>
          </label>

          <div class="setup-actions">
            <button id="saveSetupBtn" type="button" class="secondary">저장</button>
            <button id="prepareCallBtn" type="button">통화 시작</button>
          </div>

          <p id="setupHint">통화 시작 후 IsFAM 카드가 판단 중, 위험, 안전 상태로 자동 전환됩니다.</p>
        </div>
      </aside>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
